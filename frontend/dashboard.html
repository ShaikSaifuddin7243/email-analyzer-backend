<!DOCTYPE html>
<html>
<head>
    <title>Email Analyzer Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>📬 My Email Analyzer</h1>
        <button id="sync-btn" style="padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            🔄 Fetch New Emails
        </button>
    </div>
    <h3 id="email-count">Loading emails...</h3>

    
    <div class="stats-container">
        <div style="width: 400px;">
            <canvas id="newsletterChart"></canvas>
        </div>
        
        <div class="top-senders">
            <h3>🏆 Top Senders</h3>
            <ul id="sender-list">
                <li>Calculating...</li>
            </ul>
        </div>
    </div>
    
    <div id="email-container" class="dashboard">
        </div>

    <script src="script.js"></script>
</body>
</html>
