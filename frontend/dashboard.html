<!DOCTYPE html>
<html>
<head>
    <title>Email Analyzer Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>📬 My Email Analyzer</h1>
    <h3 id="email-count">Loading emails...</h3>

    
    <div class="stats-container">
        <div style="width: 400px;">
            <canvas id="newsletterChart"></canvas>
        </div>
        
        <div class="top-senders">
            <h3>🏆 Top Senders</h3>
            <ul id="sender-list">
                <li>Calculating...</li>
            </ul>
        </div>
    </div>
    
    <div id="email-container" class="dashboard">
        </div>

    <script src="script.js"></script>
</body>
</html>
